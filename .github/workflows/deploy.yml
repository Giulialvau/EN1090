name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment name (e.g. production)"
        required: true
        default: "production"
      image_tag:
        description: "Image tag to deploy (e.g. main, develop, sha-xxxx)"
        required: true
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags
        id: meta
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          echo "repo_lc=${repo_lc}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.image_tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH (pull, migrate, restart, healthcheck)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            export IMAGE_TAG="${{ steps.meta.outputs.tag }}"
            export GHCR_REPO="ghcr.io/${{ steps.meta.outputs.repo_lc }}"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Prisma migrate deploy (best effort: run inside backend container)
            docker compose -f docker-compose.prod.yml exec -T backend npm run prisma:deploy

            # Basic healthcheck
            curl -fsS "http://localhost:${BACKEND_PORT:-3001}/health" >/dev/null

