<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EN1090 — Technical Documentation</title>
    <style>
      :root {
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --code-bg: #0b1020;
        --code-fg: #e5e7eb;
        --h: #0f172a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 32px;
        font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
        color: var(--text);
      }
      header {
        border-bottom: 1px solid var(--border);
        padding-bottom: 16px;
        margin-bottom: 24px;
      }
      header h1 { margin: 0 0 6px; font-size: 22px; color: var(--h); }
      header .meta { color: var(--muted); font-size: 12px; }
      h2, h3 { color: var(--h); }
      h2 { margin-top: 28px; padding-top: 12px; border-top: 1px solid var(--border); }
      h3 { margin-top: 18px; }
      a { color: #2563eb; text-decoration: none; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      pre {
        background: var(--code-bg);
        color: var(--code-fg);
        padding: 12px 14px;
        border-radius: 8px;
        overflow: auto;
      }
      blockquote {
        margin: 12px 0;
        padding: 10px 14px;
        border-left: 4px solid var(--border);
        color: var(--muted);
      }
      .toc ul { padding-left: 18px; }
      .page-break { page-break-before: always; }
      .doc { margin-bottom: 20px; }
      .doc-title { margin: 0 0 6px; font-size: 16px; color: var(--h); }
      .doc-path { margin: 0 0 12px; font-size: 12px; color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <h1>EN1090 — Technical Documentation</h1>
      <div class="meta">Generato automaticamente — {{GENERATED_AT}}</div>
    </header>

    <section class="toc">
      <h2>Indice</h2>
      {{TOC}}
    </section>

    <div class="page-break"></div>

    {{CONTENT}}
  </body>
</html>
